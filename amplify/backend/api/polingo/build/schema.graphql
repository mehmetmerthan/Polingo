type ModelUserConnection {
  items: [User]!
  nextToken: String
}

input ModelUserFilterInput {
  id: ModelIDInput
  email: ModelStringInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
  and: [ModelUserFilterInput]
  or: [ModelUserFilterInput]
  not: ModelUserFilterInput
}

type Query {
  getUser(id: ID!): User
  listUsers(filter: ModelUserFilterInput, limit: Int, nextToken: String): ModelUserConnection
  getWord(id: ID!): Word
  listWords(filter: ModelWordFilterInput, limit: Int, nextToken: String): ModelWordConnection
  getAIScenario(id: ID!): AIScenario
  listAIScenarios(filter: ModelAIScenarioFilterInput, limit: Int, nextToken: String): ModelAIScenarioConnection
  getWebsite(id: ID!): Website
  listWebsites(filter: ModelWebsiteFilterInput, limit: Int, nextToken: String): ModelWebsiteConnection
  getYoutube(id: ID!): Youtube
  listYoutubes(filter: ModelYoutubeFilterInput, limit: Int, nextToken: String): ModelYoutubeConnection
  wordByDate(type: String!, createdAt: ModelStringKeyConditionInput, sortDirection: ModelSortDirection, filter: ModelWordFilterInput, limit: Int, nextToken: String): ModelWordConnection
}

input ModelUserConditionInput {
  email: ModelStringInput
  and: [ModelUserConditionInput]
  or: [ModelUserConditionInput]
  not: ModelUserConditionInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
}

input CreateUserInput {
  id: ID
  email: String!
}

input UpdateUserInput {
  id: ID!
  email: String
}

input DeleteUserInput {
  id: ID!
}

type Mutation {
  createUser(input: CreateUserInput!, condition: ModelUserConditionInput): User
  updateUser(input: UpdateUserInput!, condition: ModelUserConditionInput): User
  deleteUser(input: DeleteUserInput!, condition: ModelUserConditionInput): User
  createWord(input: CreateWordInput!, condition: ModelWordConditionInput): Word
  updateWord(input: UpdateWordInput!, condition: ModelWordConditionInput): Word
  deleteWord(input: DeleteWordInput!, condition: ModelWordConditionInput): Word
  createAIScenario(input: CreateAIScenarioInput!, condition: ModelAIScenarioConditionInput): AIScenario
  updateAIScenario(input: UpdateAIScenarioInput!, condition: ModelAIScenarioConditionInput): AIScenario
  deleteAIScenario(input: DeleteAIScenarioInput!, condition: ModelAIScenarioConditionInput): AIScenario
  createWebsite(input: CreateWebsiteInput!, condition: ModelWebsiteConditionInput): Website
  updateWebsite(input: UpdateWebsiteInput!, condition: ModelWebsiteConditionInput): Website
  deleteWebsite(input: DeleteWebsiteInput!, condition: ModelWebsiteConditionInput): Website
  createYoutube(input: CreateYoutubeInput!, condition: ModelYoutubeConditionInput): Youtube
  updateYoutube(input: UpdateYoutubeInput!, condition: ModelYoutubeConditionInput): Youtube
  deleteYoutube(input: DeleteYoutubeInput!, condition: ModelYoutubeConditionInput): Youtube
}

input ModelSubscriptionUserFilterInput {
  id: ModelSubscriptionIDInput
  email: ModelSubscriptionStringInput
  createdAt: ModelSubscriptionStringInput
  updatedAt: ModelSubscriptionStringInput
  and: [ModelSubscriptionUserFilterInput]
  or: [ModelSubscriptionUserFilterInput]
  userWordsId: ModelSubscriptionIDInput
}

type Subscription {
  onCreateUser(filter: ModelSubscriptionUserFilterInput): User @aws_subscribe(mutations: ["createUser"])
  onUpdateUser(filter: ModelSubscriptionUserFilterInput): User @aws_subscribe(mutations: ["updateUser"])
  onDeleteUser(filter: ModelSubscriptionUserFilterInput): User @aws_subscribe(mutations: ["deleteUser"])
  onCreateWord(filter: ModelSubscriptionWordFilterInput): Word @aws_subscribe(mutations: ["createWord"])
  onUpdateWord(filter: ModelSubscriptionWordFilterInput): Word @aws_subscribe(mutations: ["updateWord"])
  onDeleteWord(filter: ModelSubscriptionWordFilterInput): Word @aws_subscribe(mutations: ["deleteWord"])
  onCreateAIScenario(filter: ModelSubscriptionAIScenarioFilterInput): AIScenario @aws_subscribe(mutations: ["createAIScenario"])
  onUpdateAIScenario(filter: ModelSubscriptionAIScenarioFilterInput): AIScenario @aws_subscribe(mutations: ["updateAIScenario"])
  onDeleteAIScenario(filter: ModelSubscriptionAIScenarioFilterInput): AIScenario @aws_subscribe(mutations: ["deleteAIScenario"])
  onCreateWebsite(filter: ModelSubscriptionWebsiteFilterInput): Website @aws_subscribe(mutations: ["createWebsite"])
  onUpdateWebsite(filter: ModelSubscriptionWebsiteFilterInput): Website @aws_subscribe(mutations: ["updateWebsite"])
  onDeleteWebsite(filter: ModelSubscriptionWebsiteFilterInput): Website @aws_subscribe(mutations: ["deleteWebsite"])
  onCreateYoutube(filter: ModelSubscriptionYoutubeFilterInput): Youtube @aws_subscribe(mutations: ["createYoutube"])
  onUpdateYoutube(filter: ModelSubscriptionYoutubeFilterInput): Youtube @aws_subscribe(mutations: ["updateYoutube"])
  onDeleteYoutube(filter: ModelSubscriptionYoutubeFilterInput): Youtube @aws_subscribe(mutations: ["deleteYoutube"])
}

